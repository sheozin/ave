<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CueDeck Display</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<link rel="manifest" href="/display-manifest.json">
<meta name="theme-color" content="#05060f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── RESET & BASE ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#05060f}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;color:#eef2f7;
}

/* ── SETUP SCREEN ── */
#setup{
  position:fixed;inset:0;background:#05060f;
  display:flex;align-items:center;justify-content:center;z-index:9999;
}
#setup-card{
  background:#0d1520;border:1px solid rgba(255,255,255,.09);
  border-top:2px solid #3b82f6;border-radius:14px;padding:36px;
  max-width:420px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.8);
}
.su-logo{font-size:24px;font-weight:800;letter-spacing:.06em;margin-bottom:4px}
.su-logo span{color:#3b82f6}
.su-sub{font-size:11px;color:#4a6278;letter-spacing:.2em;margin-bottom:24px}
.su-lbl{font-size:10px;color:#4a6278;letter-spacing:.16em;margin-bottom:5px;display:block;text-transform:uppercase}
.su-input{
  width:100%;background:#111e2e;border:1px solid rgba(255,255,255,.09);
  color:#eef2f7;font-size:12px;padding:9px 13px;border-radius:7px;
  outline:none;margin-bottom:12px;font-family:inherit;
  transition:border-color .12s;
}
.su-input:focus{border-color:#3b82f6}
.su-btn{
  width:100%;padding:12px;background:#3b82f6;color:#fff;border:none;
  border-radius:8px;font-size:15px;font-weight:700;letter-spacing:.1em;
  cursor:pointer;transition:background .12s;
}
.su-btn:hover{background:#2563eb}
.su-err{color:#ef4444;font-size:11px;margin-bottom:10px;min-height:16px}
.su-hint{font-size:10px;color:#4a6278;margin-top:10px;line-height:1.7}

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;background:#05060f;
  display:none;align-items:center;justify-content:center;z-index:9998;
}
.ld-spin{
  width:28px;height:28px;border:2px solid rgba(255,255,255,.09);
  border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RECONNECT OVERLAY ── */
#reconnect-banner{
  position:fixed;bottom:52px;left:50%;transform:translateX(-50%);
  background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.35);
  border-radius:8px;padding:8px 20px;font-size:12px;color:#fbbf24;
  letter-spacing:.08em;z-index:500;display:none;
  animation:blink .9s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ── DISPLAY FRAME ── */
#display{display:none;width:100%;height:100%;position:relative}

/* ── SHARED LAYOUT ── */
.d-header{
  flex-shrink:0;height:46px;background:rgba(0,0,0,.5);
  border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
}
.d-header-event{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.14em;text-transform:uppercase}
.d-header-clock{font-family:'SF Mono','Fira Code',monospace;font-size:18px;font-weight:600;color:#60a5fa;letter-spacing:.06em}
.d-header-status{font-size:10px;letter-spacing:.14em;font-weight:700}
.d-header-status.live{color:#ef4444}
.d-header-status.ready{color:#fbbf24}
.d-header-status.standby{color:rgba(255,255,255,.3)}
.d-header:hover #disconnect-btn{opacity:1}

/* ── CONTENT AREA ── */
#content-area{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px;text-align:center;overflow:hidden;
  position:relative;
}

/* ── SCHEDULE MODE ── */
.sc-tag{
  display:inline-flex;align-items:center;gap:8px;
  font-size:13px;font-weight:700;letter-spacing:.28em;
  margin-bottom:20px;
}
.sc-tag-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sc-tag.live .sc-tag-dot{background:#ef4444;box-shadow:0 0 12px #ef4444;animation:blink .9s infinite}
.sc-tag.live{color:#ef4444}
.sc-tag.ready .sc-tag-dot{background:#fbbf24}
.sc-tag.ready{color:#fbbf24}
.sc-tag.standby{color:rgba(255,255,255,.3)}
.sc-tag.standby .sc-tag-dot{background:rgba(255,255,255,.3)}
.d-big-title{
  font-size:clamp(28px,6vw,80px);font-weight:700;line-height:1.1;
  letter-spacing:-.02em;margin-bottom:14px;max-width:90vw;
}
.d-big-title.live{color:#fff}
.d-big-title.standby{color:rgba(255,255,255,.5)}
.d-speaker{font-size:clamp(14px,2.5vw,28px);color:rgba(255,255,255,.6);margin-bottom:28px;font-weight:400}
.d-timer{
  font-size:clamp(48px,10vw,120px);font-weight:700;line-height:1;
  letter-spacing:.04em;margin-bottom:10px;
  font-family:'SF Mono','Fira Code',monospace;transition:color .4s;
}
.d-timer-lbl{font-size:clamp(10px,1.5vw,14px);letter-spacing:.25em;color:rgba(255,255,255,.4);margin-bottom:36px;font-weight:600;text-transform:uppercase}
.d-divider{width:60px;height:1px;background:rgba(255,255,255,.1);margin:0 auto 28px}
.d-next-lbl{font-size:clamp(9px,1.2vw,12px);color:rgba(255,255,255,.3);letter-spacing:.2em;margin-bottom:10px;font-weight:600;text-transform:uppercase}
.d-next-title{font-size:clamp(16px,3vw,36px);font-weight:600;color:rgba(255,255,255,.4)}
.d-next-time{font-size:clamp(12px,1.6vw,18px);color:#60a5fa;margin-top:6px;font-family:'SF Mono','Fira Code',monospace;letter-spacing:.06em}

/* ── WAYFINDING MODE ── */
.wf-table{border-collapse:collapse;min-width:min(640px,90vw);max-width:90vw}
.wf-table th{
  font-size:clamp(9px,1.2vw,12px);letter-spacing:.2em;color:rgba(255,255,255,.35);
  text-transform:uppercase;padding:0 20px 16px;text-align:left;font-weight:600;
}
.wf-table td{padding:10px 20px;border-top:1px solid rgba(255,255,255,.06)}
.wf-room{font-size:clamp(14px,2vw,20px);font-weight:700;color:#60a5fa;white-space:nowrap}
.wf-title{font-size:clamp(12px,1.8vw,18px);color:#eef2f7}
.wf-time{font-size:clamp(11px,1.4vw,14px);color:rgba(255,255,255,.4);font-family:'SF Mono','Fira Code',monospace;white-space:nowrap}
.wf-status{font-size:10px;letter-spacing:.12em;font-weight:700;padding:2px 8px;border-radius:3px;white-space:nowrap}
.wf-status.LIVE{background:rgba(239,68,68,.15);color:#f87171}
.wf-status.READY{background:rgba(251,191,36,.1);color:#fbbf24}
.wf-title-hdr{font-size:clamp(16px,2.5vw,26px);font-weight:700;color:rgba(255,255,255,.6);margin-bottom:28px;letter-spacing:.04em}

/* ── SPONSORS MODE ── */
.sp-sponsor-display{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:24px;width:100%;height:100%;position:relative;
}
.sp-sponsor-logo{max-width:70vw;max-height:50vh;object-fit:contain}
video.sp-sponsor-logo{
  max-width:90vw;max-height:80vh;border-radius:6px;object-fit:contain;
  background:#000;
}
/* Fullscreen video (no sponsor name, video fills display) */
.sp-sponsor-display.video-fullscreen video.sp-sponsor-logo{
  max-width:100vw;max-height:100vh;border-radius:0;width:100%;height:100%;
}
.sp-sponsor-display.video-fullscreen .sp-sponsor-name-big{display:none}
/* Video hidden until ready (prevents flash) */
video.sp-sponsor-logo{opacity:0;transition:opacity .3s ease}
video.sp-sponsor-logo.sp-ready{opacity:1}
/* Video progress bar */
.sp-video-progress{
  position:absolute;bottom:0;left:0;height:3px;
  background:linear-gradient(90deg,#3b82f6,#6366f1);
  transition:width .3s linear;border-radius:0 2px 0 0;
}

/* ── AGENDA MODE ── */
.ag-grid{display:grid;grid-template-columns:repeat(var(--col-count,3),1fr);
  gap:clamp(8px,1.5vw,20px);width:100%;height:100%;
  padding:clamp(8px,2vw,24px);box-sizing:border-box;overflow:hidden}
.ag-col{display:flex;flex-direction:column;gap:8px;overflow:hidden}
.ag-room-header{background:rgba(255,255,255,.06);border-radius:6px;
  padding:8px 12px;font-size:clamp(10px,.9vw,14px);font-weight:700;
  letter-spacing:.08em;color:rgba(255,255,255,.4);text-transform:uppercase;flex-shrink:0}
.ag-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:6px;padding:10px 12px;flex-shrink:0}
.ag-card.live{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.35)}
.ag-card.ready{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.3)}
.ag-card.empty{color:rgba(255,255,255,.25);font-size:11px;text-align:center;padding:20px}
.ag-badge{font-size:clamp(8px,.7vw,11px);font-weight:700;letter-spacing:.06em;margin-bottom:4px}
.ag-card.live .ag-badge{color:#22c55e}
.ag-card.ready .ag-badge{color:#60a5fa}
.ag-time{font-size:clamp(9px,.75vw,12px);color:rgba(255,255,255,.35);margin-bottom:2px}
.ag-title{font-size:clamp(11px,1vw,16px);font-weight:600;line-height:1.3;color:#eef2f7}
.ag-speaker{font-size:clamp(9px,.75vw,12px);color:rgba(255,255,255,.4);margin-top:3px}
.ag-empty{display:flex;align-items:center;justify-content:center;
  height:100%;color:rgba(255,255,255,.3);font-size:clamp(12px,1.2vw,18px)}

/* ── TIMELINE MODE ── */
.tl-wrap{width:100%;height:100%;overflow:hidden;position:relative;padding:clamp(12px,2vw,24px)}
.tl-header{font-size:clamp(10px,1.2vw,14px);letter-spacing:.18em;color:rgba(255,255,255,.35);
  text-transform:uppercase;font-weight:700;margin-bottom:clamp(8px,1.5vw,16px)}
.tl-list{display:flex;flex-direction:column;gap:clamp(4px,.8vw,10px);will-change:transform}
.tl-row{display:flex;align-items:flex-start;gap:clamp(10px,2vw,24px);
  padding:clamp(8px,1vw,14px) clamp(10px,1.5vw,18px);
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:8px;transition:opacity .3s,border-color .3s}
.tl-row.live{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.35)}
.tl-row.ready{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.3)}
.tl-row.ended{opacity:.25}
.tl-row.cancelled{opacity:.2;text-decoration:line-through}
.tl-time{flex-shrink:0;width:clamp(50px,6vw,80px);font-family:'SF Mono','Fira Code',monospace;
  font-size:clamp(12px,1.4vw,18px);font-weight:600;color:#60a5fa;padding-top:2px}
.tl-body{flex:1;min-width:0}
.tl-title{font-size:clamp(13px,1.5vw,20px);font-weight:600;color:#eef2f7;line-height:1.3}
.tl-meta{font-size:clamp(10px,1vw,14px);color:rgba(255,255,255,.4);margin-top:2px;
  display:flex;gap:clamp(8px,1vw,16px);flex-wrap:wrap}
.tl-badge{font-size:clamp(8px,.7vw,11px);font-weight:700;letter-spacing:.06em;
  padding:2px 8px;border-radius:3px;flex-shrink:0;align-self:flex-start;margin-top:2px}
.tl-badge.live{background:rgba(34,197,94,.15);color:#22c55e}
.tl-badge.ready{background:rgba(96,165,250,.15);color:#60a5fa}
.tl-empty{display:flex;align-items:center;justify-content:center;
  height:100%;color:rgba(255,255,255,.3);font-size:clamp(12px,1.2vw,18px)}

/* ── PROGRAMME MODE ── */
.pg-wrap{width:100%;height:100%;overflow:hidden;position:relative;padding:clamp(8px,1.5vw,20px)}
.pg-header{font-size:clamp(10px,1.2vw,14px);letter-spacing:.18em;color:rgba(255,255,255,.35);
  text-transform:uppercase;font-weight:700;margin-bottom:clamp(6px,1vw,12px)}
.pg-grid{display:grid;gap:1px;background:rgba(255,255,255,.04);border-radius:8px;overflow:hidden;
  width:100%;border:1px solid rgba(255,255,255,.06)}
.pg-corner{background:rgba(0,0,0,.3);padding:8px;font-size:clamp(8px,.7vw,10px);
  color:rgba(255,255,255,.25);letter-spacing:.12em;text-transform:uppercase;font-weight:600}
.pg-room-hdr{background:rgba(96,165,250,.08);padding:clamp(6px,.8vw,10px) clamp(8px,1vw,12px);
  font-size:clamp(9px,.9vw,13px);font-weight:700;letter-spacing:.06em;color:#60a5fa;
  text-transform:uppercase;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pg-time-lbl{background:rgba(0,0,0,.3);padding:clamp(4px,.5vw,8px) clamp(6px,.8vw,12px);
  font-family:'SF Mono','Fira Code',monospace;font-size:clamp(10px,1vw,14px);
  font-weight:600;color:rgba(255,255,255,.4);white-space:nowrap;display:flex;align-items:center}
.pg-cell{background:rgba(255,255,255,.015);padding:clamp(4px,.5vw,8px) clamp(6px,.8vw,10px);
  min-height:clamp(32px,3vw,48px);display:flex;flex-direction:column;justify-content:center;overflow:hidden}
.pg-cell.live{background:rgba(34,197,94,.1)}
.pg-cell.ready{background:rgba(96,165,250,.08)}
.pg-cell-title{font-size:clamp(10px,.9vw,14px);font-weight:600;color:#eef2f7;
  line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pg-cell-speaker{font-size:clamp(8px,.7vw,11px);color:rgba(255,255,255,.4);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.pg-cell-badge{font-size:clamp(7px,.55vw,9px);font-weight:700;letter-spacing:.04em}
.pg-cell-badge.live{color:#22c55e}
.pg-cell-badge.ready{color:#60a5fa}
.pg-empty{display:flex;align-items:center;justify-content:center;
  height:100%;color:rgba(255,255,255,.3);font-size:clamp(12px,1.2vw,18px)}
.pg-page-indicator{position:absolute;bottom:8px;right:16px;font-size:10px;
  color:rgba(255,255,255,.2);letter-spacing:.1em;font-weight:600}

.sp-sponsor-name-big{
  font-size:clamp(20px,4vw,48px);font-weight:700;color:#eef2f7;
  letter-spacing:-.01em;opacity:.9;
}
.sp-sponsor-type{font-size:clamp(10px,1.4vw,14px);color:rgba(255,255,255,.35);letter-spacing:.22em;text-transform:uppercase;margin-top:-10px}

/* ── BREAK MODE ── */
.break-icon{font-size:clamp(48px,10vw,100px);margin-bottom:20px;opacity:.8}
.break-title{font-size:clamp(24px,5vw,64px);font-weight:700;color:#eef2f7;letter-spacing:.02em;margin-bottom:12px}
.break-sub{font-size:clamp(14px,2vw,22px);color:rgba(255,255,255,.45)}

/* ── WIFI MODE ── */
.wifi-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;padding:32px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px;max-width:500px;width:90vw}
.wifi-icon{font-size:52px;opacity:.7}
.wifi-lbl{font-size:clamp(9px,1.2vw,12px);color:rgba(255,255,255,.35);letter-spacing:.22em;text-transform:uppercase;margin-bottom:-6px}
.wifi-val{font-size:clamp(20px,3.5vw,40px);font-weight:700;color:#60a5fa;font-family:'SF Mono','Fira Code',monospace;letter-spacing:.06em}

/* ── RECALL MODE ── */
.recall-timer{font-size:clamp(64px,16vw,160px);font-weight:700;color:#fbbf24;font-family:'SF Mono','Fira Code',monospace;line-height:1}
.recall-lbl{font-size:clamp(12px,2vw,20px);letter-spacing:.25em;color:rgba(255,255,255,.45);text-transform:uppercase;margin-top:12px;margin-bottom:28px}
.recall-title{font-size:clamp(18px,3vw,36px);font-weight:600;color:rgba(255,255,255,.6)}

/* ── CUSTOM MESSAGE MODE ── */
.custom-message{
  font-size:clamp(20px,4vw,52px);font-weight:700;line-height:1.3;
  letter-spacing:.01em;max-width:80vw;
}

/* ── PORTRAIT ADJUSTMENTS ── */
body.portrait .d-header{height:52px}
body.portrait .d-big-title{font-size:clamp(28px,7vw,60px)}
body.portrait .d-timer{font-size:clamp(52px,14vw,100px)}
body.portrait .wf-table{min-width:min(90vw,400px)}

/* ── LIVE BORDER GLOW ── */
body.is-live #display{
  box-shadow:inset 0 0 0 3px rgba(239,68,68,.35),inset 0 0 40px rgba(239,68,68,.06);
}

/* ── ANIMATIONS ── */
@keyframes fade-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fade-in{animation:fade-in .4s ease both}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── STAGE TIMER MODE ─────────────────────────── */
.st-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;background:#05060f;gap:0;padding:2vw;box-sizing:border-box}
.st-status{font-size:clamp(13px,2.2vw,26px);font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#4b5563;margin-bottom:.2em}
.st-status.live{color:#22c55e}
.st-status.hold{color:#f97316}
.st-status.overrun{color:#ef4444}
.st-timer{font-size:clamp(80px,22vw,260px);font-weight:800;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums;transition:color .4s}
.st-timer.flash{animation:st-flash .65s step-end infinite}
@keyframes st-flash{0%,100%{opacity:1}50%{opacity:.12}}
.st-timer-lbl{font-size:clamp(11px,1.8vw,20px);font-weight:600;letter-spacing:.22em;color:#4b5563;margin-top:.35em;margin-bottom:.6em}
.st-progress-bar{width:84%;max-width:960px;height:7px;background:rgba(255,255,255,.08);border-radius:4px;margin-bottom:1.8em}
.st-progress-fill{height:100%;border-radius:4px;transition:width .95s linear,background-color .4s}
.st-title{font-size:clamp(18px,3.2vw,52px);font-weight:700;color:#fff;text-align:center;max-width:90%}
.st-speaker{font-size:clamp(12px,1.8vw,28px);color:#6b7280;margin-top:.3em;text-align:center}
.st-next{font-size:clamp(10px,1.3vw,16px);color:#374151;margin-top:1.8em;letter-spacing:.07em;text-align:center}
.st-standby-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;background:#05060f;gap:.5em}
.st-standby-label{font-size:clamp(16px,3vw,36px);font-weight:700;letter-spacing:.2em;color:#374151}
.st-standby-session{font-size:clamp(16px,2.8vw,40px);color:#fff;font-weight:600;text-align:center;max-width:80%}
.st-standby-countdown{font-size:clamp(28px,8vw,110px);font-weight:800;color:#fbbf24;font-variant-numeric:tabular-nums}
.st-standby-lbl{font-size:clamp(11px,1.5vw,18px);letter-spacing:.2em;color:#4b5563}
</style>
</head>
<body>

<!-- SETUP (shown when URL params are missing) -->
<div id="setup">
  <div id="setup-card">
    <div class="su-logo" style="display:flex;align-items:center;gap:10px;justify-content:center"><svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" style="width:32px;height:32px;flex-shrink:0"><defs><linearGradient id="dl-bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#1d4ed8"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient></defs><rect width="40" height="40" rx="12" fill="url(#dl-bg)"/><path d="M 25 10 A 10.5 10.5 0 1 0 25 30" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/></svg><span>Cue<span>Deck</span></span> <span style="font-size:16px;font-weight:600;letter-spacing:.2em;color:#4a6278">DISPLAY</span></div>
    <div class="su-sub">DIGITAL SIGNAGE</div>
    <div class="su-err" id="su-err"></div>
    <!-- Pairing code UI -->
    <div style="text-align:center">
      <div style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px">Pairing Code</div>
      <div id="pairing-code" style="font-size:48px;font-weight:800;letter-spacing:8px;color:#fff;font-family:monospace;margin-bottom:6px">---</div>
      <div style="font-size:11px;color:#64748b;margin-bottom:20px">Enter this code in your CueDeck console to connect</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:8px">
        <span style="width:7px;height:7px;border-radius:50%;background:#34d399;box-shadow:0 0 6px #34d399;display:inline-block;animation:pulse 2s infinite"></span>
        <span id="pairing-status" style="font-size:11px;color:#34d399">Waiting for connection...</span>
      </div>
      <div id="pairing-timer" style="margin-top:16px;font-size:10px;color:#4b5563"></div>
      <div style="margin-top:24px;border-top:1px solid #1e293b;padding-top:16px">
        <div style="font-size:10px;color:#4b5563;margin-bottom:6px">Or enter Display ID manually:</div>
        <div style="display:flex;gap:8px;justify-content:center">
          <input id="manual-display-id" type="text" placeholder="Display UUID" style="background:#0f172a;border:1px solid #334155;color:#e5e7eb;padding:6px 10px;border-radius:6px;font-size:11px;width:200px;text-align:center;font-family:monospace;outline:none">
          <button onclick="manualBoot()" style="background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.4);color:#60a5fa;border-radius:6px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:inherit">Connect</button>
        </div>
      </div>
    </div>
    <!-- Hidden fields — override hardcoded credentials if needed -->
    <input id="su-url" type="hidden" value="">
    <input id="su-key" type="hidden" value="">
    <!-- Legacy hidden input kept for E2E test compatibility -->
    <input id="su-id" type="hidden" value="">
  </div>
</div>

<div id="loading"><div class="ld-spin"></div></div>
<div id="reconnect-banner">⟳ RECONNECTING — DATA MAY BE STALE</div>

<!-- DISPLAY FRAME (filled by JS) -->
<div id="display" style="display:none;flex-direction:column">
  <div class="d-header">
    <span class="d-header-event" id="d-event-name">—</span>
    <span class="d-header-status standby" id="d-status-lbl">STANDBY</span>
    <span class="d-header-clock" id="d-clock">--:--:--</span>
    <button id="disconnect-btn" onclick="disconnectDisplay()" style="background:none;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.3);font-size:9px;padding:3px 8px;border-radius:4px;cursor:pointer;letter-spacing:.1em;opacity:0;transition:opacity .3s;font-family:inherit">UNPAIR</button>
  </div>
  <div id="content-area"></div>
</div>

<!-- Session progress bar — thin strip at bottom, green → amber → red -->
<div id="d-progress-bar" style="position:fixed;bottom:0;left:0;height:4px;background:#22c55e;
  transition:width 1s linear,background .5s;width:0;z-index:50;pointer-events:none;"></div>

<!-- Identify flash overlay — triggered by console ⚡ ID button -->
<div id="identify-flash" style="display:none;position:fixed;inset:0;background:#fff;
  z-index:9999;pointer-events:none;opacity:0;transition:opacity 0.3s;"></div>

<script>
// ═══════════════════════════════════════════════════
// CREDENTIALS (hardcoded — only Display ID needed in URL)
// ═══════════════════════════════════════════════════
const SUPABASE_URL      = 'https://sawekpguemzvuvvulfbc.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_FJg1ZR0rwYeP3EwQu4xRNA_WqEp4PaB';

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let sb    = null;
var D     = null;  // display row from leod_signage_displays  (var → window.D for E2E tests)
var S     = { sessions: [], event: null, clockOffset: 0, sponsors: [], broadcast: null }; // var → window.S
let _chan  = null;
let _tick  = null;
let _heartbeat   = null;
let _sponsorIdx  = 0;
let _sponsorTimer = null;
let _retries     = 0;
let _seqIdx      = 0;      // current slide index in sequence playlist
let _seqTimer    = null;   // setTimeout handle for sequence advance
let _tlAnimTimer = null;   // timeline scroll animation frame id
let _tlPageTimer = null;   // timeline paginate interval
let _tlPageIdx   = 0;      // timeline current page index
let _pgPageTimer = null;   // programme paginate interval
let _pgPageIdx   = 0;      // programme current page index

// ═══════════════════════════════════════════════════
// BOOT FROM URL PARAMS
// ═══════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  // Try hash params first (works with file://), then query params (works with http://)
  const fromHash  = new URLSearchParams(window.location.hash.slice(1));
  const fromQuery = new URLSearchParams(window.location.search);
  const get = k => fromHash.get(k) || fromQuery.get(k);

  const id  = get('id');
  const url = get('url') || SUPABASE_URL;   // fall back to hardcoded
  const key = get('key') || SUPABASE_ANON_KEY;

  // Check localStorage for previously paired display
  const savedId = localStorage.getItem('cuedeck_display_id');

  const bootId = id || savedId;

  if (bootId) document.getElementById('su-id').value = bootId;
  // Pre-fill hidden inputs so connectDisplay() and tests can read them back
  document.getElementById('su-url').value = url;
  document.getElementById('su-key').value = key;

  // Auto-boot if we have a display ID (from URL or localStorage)
  if (bootId) {
    _bootedFromLocalStorage = !id && !!savedId;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('loading').style.display = 'flex';
    bootDisplay(url, key, bootId);
  } else {
    // No ID anywhere — initialize Supabase client and show pairing code flow
    sb = supabase.createClient(url, key);
    startPairing();
  }

  // Register service worker for PWA install
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/display-sw.js').catch(() => {});
  }
});

async function connectDisplay() {
  const url = document.getElementById('su-url').value.trim() || SUPABASE_URL;
  const key = document.getElementById('su-key').value.trim() || SUPABASE_ANON_KEY;
  const id  = document.getElementById('su-id').value.trim();
  const err = document.getElementById('su-err');
  err.textContent = '';
  if (!id) { err.textContent = 'Display ID is required.'; return; }
  document.getElementById('setup').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  await bootDisplay(url, key, id);
}

// ═══════════════════════════════════════════════════
// PAIRING CODE
// ═══════════════════════════════════════════════════
function generatePairingCode() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no 0/O/1/I
  var code = '';
  for (var i = 0; i < 6; i++) {
    code += chars[Math.floor(Math.random() * chars.length)];
  }
  return code.slice(0, 3) + '-' + code.slice(3);
}

var _pairingPollInterval = null;
var _pairingTimerInterval = null;

async function startPairing() {
  var code = generatePairingCode();
  var rawCode = code.replace('-', '');
  var expiresAt = new Date(Date.now() + 5 * 60 * 1000).toISOString();

  // Store in pairing table (uses a placeholder event_id — console will set the real one)
  var { error } = await sb.from('leod_signage_pairing').insert({
    code: rawCode,
    event_id: '00000000-0000-0000-0000-000000000000',
    expires_at: expiresAt,
  });
  if (error) {
    console.error('Failed to create pairing code:', error);
    // Fall back to manual mode — just show the code as unavailable
    document.getElementById('pairing-code').textContent = '---';
    document.getElementById('pairing-status').textContent = 'Pairing unavailable — use manual entry below';
    document.getElementById('pairing-status').style.color = '#6b7280';
    return;
  }

  document.getElementById('pairing-code').textContent = code;

  // Countdown timer
  var endTime = Date.now() + 5 * 60 * 1000;
  var timerEl = document.getElementById('pairing-timer');
  if (_pairingTimerInterval) clearInterval(_pairingTimerInterval);
  _pairingTimerInterval = setInterval(function() {
    var remaining = Math.max(0, endTime - Date.now());
    var min = Math.floor(remaining / 60000);
    var sec = Math.floor((remaining % 60000) / 1000);
    timerEl.textContent = 'Code expires in ' + min + ':' + (sec < 10 ? '0' : '') + sec;
    if (remaining <= 0) {
      clearInterval(_pairingTimerInterval);
      clearInterval(_pairingPollInterval);
      timerEl.textContent = 'Code expired — generating new code...';
      setTimeout(startPairing, 1000);
    }
  }, 1000);

  // Poll for pairing confirmation every 2 seconds
  if (_pairingPollInterval) clearInterval(_pairingPollInterval);
  _pairingPollInterval = setInterval(async function() {
    var { data } = await sb.from('leod_signage_pairing')
      .select('display_id')
      .eq('code', rawCode)
      .single();
    if (data && data.display_id) {
      clearInterval(_pairingPollInterval);
      clearInterval(_pairingTimerInterval);
      document.getElementById('pairing-status').textContent = 'Connected!';
      document.getElementById('pairing-status').style.color = '#34d399';
      document.getElementById('pairing-timer').textContent = '';
      var url = document.getElementById('su-url').value.trim() || SUPABASE_URL;
      var key = document.getElementById('su-key').value.trim() || SUPABASE_ANON_KEY;
      setTimeout(function() {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('loading').style.display = 'flex';
        bootDisplay(url, key, data.display_id);
      }, 500);
    }
  }, 2000);
}

function manualBoot() {
  var id = document.getElementById('manual-display-id').value.trim();
  if (!id) { document.getElementById('su-err').textContent = 'Display ID is required.'; return; }
  if (_pairingPollInterval) clearInterval(_pairingPollInterval);
  if (_pairingTimerInterval) clearInterval(_pairingTimerInterval);
  var url = document.getElementById('su-url').value.trim() || SUPABASE_URL;
  var key = document.getElementById('su-key').value.trim() || SUPABASE_ANON_KEY;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  bootDisplay(url, key, id);
}

function disconnectDisplay() {
  // Clear saved display and reload to show pairing screen
  localStorage.removeItem('cuedeck_display_id');
  if (_chan) { sb.removeChannel(_chan); _chan = null; }
  if (_tick) clearInterval(_tick);
  if (_heartbeat) clearInterval(_heartbeat);
  window.location.replace(window.location.pathname);
}

// ═══════════════════════════════════════════════════
// BOOT SEQUENCE
// ═══════════════════════════════════════════════════
var _bootedFromLocalStorage = false;

async function bootDisplay(url, key, id) {
  try {
    sb = supabase.createClient(url, key);

    // 1. Sync clock
    await syncClock();

    // 2. Load display config
    const { data: disp, error: dErr } = await sb.from('leod_signage_displays')
      .select('*').eq('id', id).single();
    if (dErr || !disp) throw new Error(dErr?.message || 'Display not found');
    D = disp;

    // Apply orientation to body
    if (D.orientation === 'portrait') document.body.classList.add('portrait');

    // 3. Load event
    const { data: ev } = await sb.from('leod_events')
      .select('*').eq('id', D.event_id).single();
    S.event = ev;

    // 4. Load sessions
    const { data: sessions } = await sb.from('leod_sessions')
      .select('*').eq('event_id', D.event_id).order('sort_order');
    S.sessions = sessions || [];

    // 5. Load sponsors (if needed)
    const { data: sponsors } = await sb.from('leod_signage_sponsors')
      .select('*').eq('event_id', D.event_id).eq('active', true)
      .order('sort_order').order('name');
    S.sponsors = sponsors || [];

    // 6. Subscribe to changes
    subscribeAll();

    // 7. Show display
    document.getElementById('loading').style.display = 'none';
    document.getElementById('display').style.display = 'flex';

    // 8. Start clock tick
    _tick = setInterval(tick, 1000);
    tick();

    // 9. Start heartbeat (update last_seen_at every 30s)
    sendHeartbeat();
    _heartbeat = setInterval(sendHeartbeat, 30_000);

    // 10. Resync clock every 5 min
    setInterval(syncClock, 300_000);

    // Save display ID for auto-reconnect on next launch
    localStorage.setItem('cuedeck_display_id', id);

    render();
    startSequence();  // Begin cycling if display has a sequence playlist
  } catch (e) {
    // If auto-reconnect from localStorage failed, clear saved ID and fall back to pairing
    var wasLocalStorage = localStorage.getItem('cuedeck_display_id') === id;
    if (wasLocalStorage) localStorage.removeItem('cuedeck_display_id');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('setup').style.display = 'flex';
    document.getElementById('su-err').textContent = `Connection failed: ${e.message}`;
    // Only auto-start pairing if we booted from localStorage (not URL params)
    if (_bootedFromLocalStorage && !_pairingPollInterval) {
      if (!sb) sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      startPairing();
    }
  }
}

// ═══════════════════════════════════════════════════
// CLOCK SYNC
// ═══════════════════════════════════════════════════
async function syncClock() {
  try {
    const t0 = Date.now();
    const { data } = await sb.from('leod_clock').select('server_time').eq('id', 'master').single();
    const t1 = Date.now();
    if (!data) return;
    const rtt = t1 - t0;
    const serverMs = new Date(data.server_time).getTime();
    S.clockOffset = serverMs - t1 + rtt / 2;
  } catch { /* continue with local time */ }
}

function correctedNow() { return Date.now() + (S.clockOffset || 0); }

function correctedHMS() {
  const d = new Date(correctedNow());
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════════════
// REALTIME
// ═══════════════════════════════════════════════════
function subscribeAll() {
  if (_chan) _chan.unsubscribe();
  _chan = sb.channel('display-' + D.id)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'leod_sessions',
        filter: `event_id=eq.${D.event_id}` }, p => {
      if (p.eventType === 'DELETE') {
        S.sessions = S.sessions.filter(s => s.id !== p.old.id);
      } else {
        const idx = S.sessions.findIndex(s => s.id === p.new.id);
        if (idx >= 0) S.sessions[idx] = p.new; else S.sessions.push(p.new);
        S.sessions.sort((a,b) => (a.sort_order||0) - (b.sort_order||0));
      }
      render();
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'leod_signage_displays',
        filter: `id=eq.${D.id}` }, p => {
      if (p.new?.global_override?.type === 'identify') flashIdentify();
      const prevSeq = JSON.stringify(D?.sequence);
      D = p.new;
      // Reset sequence index if playlist changed remotely
      if (JSON.stringify(D.sequence) !== prevSeq) _seqIdx = 0;
      render();
      startSequence();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'leod_signage_sponsors',
        filter: `event_id=eq.${D.event_id}` }, p => {
      if (p.eventType === 'DELETE') {
        S.sponsors = S.sponsors.filter(s => s.id !== p.old.id);
      } else {
        const idx = S.sponsors.findIndex(s => s.id === p.new.id);
        if (idx >= 0) S.sponsors[idx] = p.new; else S.sponsors.push(p.new);
        S.sponsors.sort((a,b) => (a.sort_order||0) - (b.sort_order||0));
      }
      if (activeMode() === 'sponsors') render();
    })
    .subscribe(status => {
      const banner = document.getElementById('reconnect-banner');
      if (status === 'SUBSCRIBED') {
        _retries = 0;
        if (banner) banner.style.display = 'none';
      } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
        if (banner) banner.style.display = 'block';
        scheduleReconnect();
      }
    });
}

function scheduleReconnect() {
  const delay = Math.min(1000 * 2 ** _retries, 30_000) + Math.random() * 500;
  _retries++;
  setTimeout(async () => {
    try {
      await syncClock();
      const { data: sessions } = await sb.from('leod_sessions')
        .select('*').eq('event_id', D.event_id).order('sort_order');
      S.sessions = sessions || [];
      const { data: disp } = await sb.from('leod_signage_displays').select('*').eq('id', D.id).single();
      if (disp) D = disp;
      subscribeAll();
      render();
    } catch { scheduleReconnect(); }
  }, delay);
}

// ═══════════════════════════════════════════════════
// HEARTBEAT
// ═══════════════════════════════════════════════════
async function sendHeartbeat() {
  if (!D?.id || !sb) return;
  await sb.from('leod_signage_displays')
    .update({ last_seen_at: new Date().toISOString() }).eq('id', D.id);
}

// ═══════════════════════════════════════════════════
// CONTENT RESOLVER
// ═══════════════════════════════════════════════════
function activeMode() {
  // Priority: override → sequence slide → static content_mode
  if (D?.override_content?.mode) return D.override_content.mode;
  const seq = D?.sequence;
  if (seq && seq.length) return seq[_seqIdx % seq.length].mode;
  return D?.content_mode || 'schedule';
}

// ═══════════════════════════════════════════════════
// SEQUENCE CYCLING ENGINE
// ═══════════════════════════════════════════════════
function stopSequence() {
  if (_seqTimer) { clearTimeout(_seqTimer); _seqTimer = null; }
}

function startSequence() {
  stopSequence();
  const seq = D?.sequence;
  if (!seq || !seq.length) return;         // No sequence — use static content_mode
  if (D?.override_content?.mode) return;  // Override active — pause sequence

  const advance = () => {
    _seqIdx = (_seqIdx + 1) % seq.length;
    render();
    const dur = Math.max(5, (seq[_seqIdx % seq.length].duration || 15)) * 1000;
    _seqTimer = setTimeout(advance, dur);
  };
  const dur = Math.max(5, (seq[0].duration || 15)) * 1000;
  _seqTimer = setTimeout(advance, dur);
}

function liveSession() { return S.sessions.find(s => s.status === 'LIVE' || s.status === 'OVERRUN'); }
function readySession() { return S.sessions.find(s => s.status === 'READY' || s.status === 'CALLING'); }

// ═══════════════════════════════════════════════════
// TICK
// ═══════════════════════════════════════════════════
function tick() {
  const clockEl = document.getElementById('d-clock');
  if (clockEl) clockEl.textContent = correctedHMS();

  const lv = liveSession();
  const rd = readySession();

  // Update header status label
  const statusEl = document.getElementById('d-status-lbl');
  if (statusEl) {
    if (lv) { statusEl.textContent = '● LIVE'; statusEl.className = 'd-header-status live'; }
    else if (rd) { statusEl.textContent = '◈ READY'; statusEl.className = 'd-header-status ready'; }
    else { statusEl.textContent = 'STANDBY'; statusEl.className = 'd-header-status standby'; }
  }

  document.body.classList.toggle('is-live', !!lv);

  // Lightweight timer update (no full re-render)
  const mode = activeMode();
  if (mode === 'schedule' || mode === 'recall') updateTimerInPlace();
  if (mode === 'stage-timer') updateStageTimerInPlace();
}

function updateTimerInPlace() {
  const timerEl = document.getElementById('d-live-timer');
  const timerLbl = document.getElementById('d-live-timer-lbl');
  const recallEl = document.getElementById('d-recall-timer');
  const lv = liveSession();
  const rd = readySession();

  if (timerEl && lv && lv.actual_start) {
    const startMs  = new Date(lv.actual_start).getTime();
    const elapsed  = correctedNow() - startMs;
    const durMs    = schedDurMs(lv);
    const remain   = durMs - elapsed;
    const ov       = remain < 0;
    timerEl.textContent = fmtTimer(remain);
    const tc = ov ? '#ef4444' : (remain < 120_000 ? '#ef4444' : remain < 300_000 ? '#fbbf24' : '#22c55e');
    timerEl.style.color = tc;
    if (timerLbl) timerLbl.textContent = ov ? 'OVERTIME' : remain < 120_000 ? 'ENDING NOW' : remain < 300_000 ? 'WRAPPING UP' : 'REMAINING';
    // Progress bar
    const pb = document.getElementById('d-progress-bar');
    if (pb) {
      const pct = Math.min(100, (elapsed / Math.max(1, durMs)) * 100);
      pb.style.width      = `${pct}%`;
      pb.style.background = ov ? '#ef4444' : remain < 120_000 ? '#f59e0b' : '#22c55e';
    }
  } else if (timerEl && rd) {
    const start = toMs(rd.scheduled_start);
    const now   = toTimeMs(correctedNow());
    const diff  = start - now;
    timerEl.textContent = fmtCountdown(diff);
    timerEl.style.color = '#fbbf24';
    if (timerLbl) timerLbl.textContent = 'TO START';
    // Clear progress bar when no live session
    const pb = document.getElementById('d-progress-bar');
    if (pb) pb.style.width = '0';
  } else {
    const pb = document.getElementById('d-progress-bar');
    if (pb) pb.style.width = '0';
  }

  if (recallEl && rd) {
    const start = toMs(rd.scheduled_start);
    const now   = toTimeMs(correctedNow());
    const diff  = start - now;
    recallEl.textContent = fmtCountdown(Math.max(0, diff));
  }
}

function updateStageTimerInPlace() {
  const stEl = document.getElementById('st-timer');
  if (!stEl) return; // not in stage-timer mode

  const live2 = liveSession();
  const held2 = S.sessions.find(s => s.status === 'HOLD');
  const sess2 = live2 || held2;

  // Standby countdown update (no LIVE/HOLD session)
  const sbCd = document.getElementById('st-standby-countdown');
  if (sbCd) {
    const nx = readySession() || S.sessions.find(s => !['ENDED','CANCELLED'].includes(s.status));
    if (nx) sbCd.textContent = fmtCountdown(Math.max(0, toMs(nx.scheduled_start) - toTimeMs(correctedNow())));
  }

  if (!sess2) return;

  const isHold2  = sess2.status === 'HOLD';
  const durMs2   = schedDurMs(sess2);
  const startMs2 = sess2.actual_start
    ? new Date(sess2.actual_start).getTime()
    : correctedNow() - durMs2 / 2;
  const liveR2   = durMs2 - (correctedNow() - startMs2);

  if (isHold2 && _stHoldRemain === null) _stHoldRemain = liveR2;
  if (!isHold2) _stHoldRemain = null;

  const rem2 = isHold2 ? _stHoldRemain : liveR2;
  const ov2  = rem2 < 0;
  const col2 = ov2 ? '#ef4444'
    : isHold2          ? '#f97316'
    : rem2 < 120_000   ? '#ef4444'
    : rem2 < 300_000   ? '#f59e0b'
    : '#22c55e';

  stEl.textContent  = fmtTimer(rem2);
  stEl.style.color  = col2;
  stEl.className    = 'st-timer' + (ov2 && !isHold2 ? ' flash' : '');

  const lbl2  = document.getElementById('st-timer-lbl');
  if (lbl2)  lbl2.textContent = ov2 ? 'OVERTIME' : isHold2 ? 'PAUSED' : 'REMAINING';

  const fill2 = document.getElementById('st-progress-fill');
  if (fill2) {
    fill2.style.width           = Math.max(0, Math.min(100, (rem2 / durMs2) * 100)) + '%';
    fill2.style.backgroundColor = col2;
  }

  const stat2 = document.getElementById('st-status');
  if (stat2) {
    stat2.textContent = isHold2 ? 'HOLD' : ov2 ? 'OVERTIME' : 'LIVE';
    stat2.className   = 'st-status ' + (isHold2 ? 'hold' : ov2 ? 'overrun' : 'live');
  }
}

// ═══════════════════════════════════════════════════
// RENDER — main render switch
// ═══════════════════════════════════════════════════
function render() {
  const mode = activeMode();
  const area = document.getElementById('content-area');
  if (!area) return;

  // Clear sponsor rotation if leaving sponsor mode
  if (mode !== 'sponsors' && _sponsorTimer) {
    clearInterval(_sponsorTimer); _sponsorTimer = null;
  }
  // Clear timeline timers if leaving timeline mode
  if (mode !== 'timeline') { stopTimelineAnimation(); stopTimelinePaginate(); }
  // Clear programme timers if leaving programme mode
  if (mode !== 'programme') { stopProgrammePaginate(); }

  switch (mode) {
    case 'schedule':  area.innerHTML = renderSchedule(); break;
    case 'wayfinding':area.innerHTML = renderWayfinding(); break;
    case 'sponsors':  renderSponsors(area); break;
    case 'break':     area.innerHTML = renderBreak(); break;
    case 'wifi':      area.innerHTML = renderWifi(); break;
    case 'recall':      area.innerHTML = renderRecall(); break;
    case 'stage-timer': renderStageTimerArea(area); break;
    case 'custom':      area.innerHTML = renderCustom(); break;
    case 'agenda':    renderAgenda(area); break;
    case 'timeline':  renderTimeline(area); break;
    case 'programme': renderProgramme(area); break;
    default:          area.innerHTML = renderSchedule();
  }

  // Update event name in header
  const evEl = document.getElementById('d-event-name');
  if (evEl && S.event) evEl.textContent = (S.event.name || '').toUpperCase() + (D?.zone_type ? ` · ${D.zone_type.toUpperCase()}` : '');

  // Run timer update immediately
  updateTimerInPlace();
}

// ═══════════════════════════════════════════════════
// SCHEDULE MODE
// ═══════════════════════════════════════════════════
function renderSchedule() {
  const lv = liveSession(), rd = readySession();
  const cur = lv || rd;
  const next = cur
    ? S.sessions.find(s => (s.sort_order||0) > (cur.sort_order||0) && !['ENDED','CANCELLED'].includes(s.status))
    : S.sessions.find(s => !['ENDED','CANCELLED'].includes(s.status));

  if (!cur && !next) {
    return `<div class="fade-in">
      <div class="sc-tag standby"><div class="sc-tag-dot"></div>STANDBY</div>
      <div class="d-big-title standby">NO ACTIVE SESSION</div>
    </div>`;
  }

  const tagCls = lv ? 'live' : rd ? 'ready' : 'standby';
  const tagLbl = lv ? '● YOU ARE LIVE' : rd ? '◈ STARTING SHORTLY' : 'STANDBY';

  const timerHtml = cur
    ? `<div class="d-timer" id="d-live-timer" style="color:#22c55e">--:--</div>
       <div class="d-timer-lbl" id="d-live-timer-lbl">REMAINING</div>`
    : '';

  const nextHtml = next
    ? `<div class="d-divider"></div>
       <div class="d-next-lbl">NEXT SESSION</div>
       <div class="d-next-title">${esc(next.title)}</div>
       <div class="d-next-time">${(next.scheduled_start||next.planned_start||'').substring(0,5)}</div>`
    : '';

  return `<div class="fade-in">
    <div class="sc-tag ${tagCls}"><div class="sc-tag-dot"></div>${tagLbl}</div>
    <div class="d-big-title ${lv?'live':''}">${esc(cur?.title || next?.title || '—')}</div>
    ${cur?.speaker ? `<div class="d-speaker">${esc(cur.speaker)}${cur.company?` · ${esc(cur.company)}`:''}</div>` : ''}
    ${timerHtml}
    ${nextHtml}
  </div>`;
}

// ═══════════════════════════════════════════════════
// WAYFINDING MODE
// ═══════════════════════════════════════════════════
function renderWayfinding() {
  // Group active sessions by room
  const active = S.sessions.filter(s => !['ENDED','CANCELLED'].includes(s.status) && s.room);
  // Apply filter_room if set
  const filtered = D?.filter_room
    ? active.filter(s => s.room === D.filter_room)
    : active;

  // Group by room, keep only the first active session per room
  const byRoom = {};
  for (const s of filtered) {
    if (!byRoom[s.room]) byRoom[s.room] = s;
  }
  const rooms = Object.values(byRoom).sort((a,b) => a.room.localeCompare(b.room));

  if (!rooms.length) {
    return `<div class="fade-in">
      <div class="wf-title-hdr">SESSION DIRECTORY</div>
      <div style="color:rgba(255,255,255,.3);font-size:18px">No active sessions</div>
    </div>`;
  }

  const rows = rooms.map(s => {
    const isLive = s.status === 'LIVE' || s.status === 'OVERRUN';
    const isReady = s.status === 'READY' || s.status === 'CALLING';
    const stLbl = isLive ? 'LIVE' : isReady ? 'READY' : s.status;
    const stCls = isLive ? 'LIVE' : isReady ? 'READY' : '';
    return `<tr>
      <td class="wf-room">${esc(s.room)}</td>
      <td class="wf-title">${esc(s.title)}</td>
      <td class="wf-time">${(s.scheduled_start||s.planned_start||'').substring(0,5)}</td>
      <td>${stCls ? `<span class="wf-status ${stCls}">${stLbl}</span>` : ''}</td>
    </tr>`;
  }).join('');

  return `<div class="fade-in">
    <div class="wf-title-hdr">ROOM DIRECTORY</div>
    <table class="wf-table">
      <thead><tr>
        <th>ROOM</th><th>SESSION</th><th>TIME</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ═══════════════════════════════════════════════════
// SPONSORS MODE — rotating carousel with video support
// ═══════════════════════════════════════════════════
let _currentVideoSrc = null;   // guard: skip re-render if same video playing
let _activeVideoEl = null;     // ref to currently playing <video>
let _activeCapTimer = null;
let _activeProgressTimer = null;

function isVideoUrl(url) {
  return /\.(mp4|webm|ogg|mov)(\?|$)/i.test(url);
}

function _cleanupActiveVideo() {
  if (_activeVideoEl) {
    _activeVideoEl.pause();
    _activeVideoEl.removeAttribute('src');
    _activeVideoEl.load();
    _activeVideoEl = null;
  }
  if (_activeCapTimer) { clearTimeout(_activeCapTimer); _activeCapTimer = null; }
  if (_activeProgressTimer) { clearInterval(_activeProgressTimer); _activeProgressTimer = null; }
  _currentVideoSrc = null;
}

function renderSponsors(area) {
  if (!S.sponsors.length) {
    _cleanupActiveVideo();
    area.textContent = '';
    const wrap = document.createElement('div');
    wrap.className = 'fade-in sp-sponsor-display';
    const msg = document.createElement('div');
    msg.style.cssText = 'color:rgba(255,255,255,.3);font-size:20px';
    msg.textContent = 'No sponsors configured';
    wrap.appendChild(msg);
    area.appendChild(wrap);
    return;
  }

  // Guard: if the same video is already playing, don't restart it
  const currentSponsor = S.sponsors[_sponsorIdx % S.sponsors.length];
  if (_currentVideoSrc && currentSponsor.logo_url === _currentVideoSrc && _activeVideoEl && !_activeVideoEl.ended) {
    return;
  }

  if (_sponsorTimer) { clearTimeout(_sponsorTimer); _sponsorTimer = null; }
  const audioEnabled = D?.audio_enabled === true;

  const showSponsor = (idx) => {
    _cleanupActiveVideo();
    if (_sponsorTimer) { clearTimeout(_sponsorTimer); _sponsorTimer = null; }
    const s = S.sponsors[idx % S.sponsors.length];
    const isVideo = s.logo_url && isVideoUrl(s.logo_url);
    area.style.background = s.bg_color || '#05060f';
    area.textContent = '';

    const wrap = document.createElement('div');
    wrap.className = 'fade-in sp-sponsor-display' + (isVideo ? ' video-fullscreen' : '');

    if (isVideo) {
      const vid = document.createElement('video');
      vid.className = 'sp-sponsor-logo';  // starts opacity:0 via CSS
      vid.muted = !audioEnabled;           // start unmuted if audio enabled
      vid.playsInline = true;
      vid.preload = 'auto';

      const nameEl = document.createElement('div');
      nameEl.className = 'sp-sponsor-name-big';
      nameEl.textContent = s.name;

      const progress = document.createElement('div');
      progress.className = 'sp-video-progress';
      progress.style.width = '0%';

      wrap.appendChild(vid);
      wrap.appendChild(nameEl);
      wrap.appendChild(progress);
      area.appendChild(wrap);

      // Track this video
      _currentVideoSrc = s.logo_url;
      _activeVideoEl = vid;

      // Wait until enough data buffered, then play + reveal
      // Video is invisible (opacity:0) until sp-ready class added,
      // so any muted-fallback retry happens before the user sees anything
      vid.addEventListener('canplay', () => {
        const p = vid.play();
        if (p) p.then(() => {
          vid.classList.add('sp-ready');  // fade in
        }).catch(() => {
          // Autoplay with sound blocked by browser — mute and retry
          vid.muted = true;
          vid.play().then(() => {
            vid.classList.add('sp-ready');
          }).catch(() => {
            vid.classList.add('sp-ready'); // show anyway
          });
        });
      }, { once: true });

      // Set source after listeners are attached
      vid.src = s.logo_url;

      _activeProgressTimer = setInterval(() => {
        if (vid.duration && progress) {
          progress.style.width = (vid.currentTime / vid.duration * 100) + '%';
        }
      }, 200);

      const maxCap = 60;
      _activeCapTimer = setTimeout(() => {
        _cleanupActiveVideo();
        advanceToNext();
      }, maxCap * 1000);

      vid.addEventListener('ended', () => {
        _cleanupActiveVideo();
        advanceToNext();
      }, { once: true });

      vid.addEventListener('error', () => {
        _cleanupActiveVideo();
        area.textContent = '';
        const errWrap = document.createElement('div');
        errWrap.className = 'fade-in sp-sponsor-display';
        const errMsg = document.createElement('div');
        errMsg.style.cssText = 'color:rgba(255,100,100,.6);font-size:16px';
        errMsg.textContent = 'Video format not supported';
        const errName = document.createElement('div');
        errName.className = 'sp-sponsor-name-big';
        errName.textContent = s.name;
        errWrap.appendChild(errMsg);
        errWrap.appendChild(errName);
        area.appendChild(errWrap);
        setTimeout(advanceToNext, 3000);
      }, { once: true });

    } else if (s.logo_url) {
      const img = document.createElement('img');
      img.className = 'sp-sponsor-logo';
      img.src = s.logo_url;
      img.alt = s.name;
      const nameEl = document.createElement('div');
      nameEl.className = 'sp-sponsor-name-big';
      nameEl.textContent = s.name;
      wrap.appendChild(img);
      wrap.appendChild(nameEl);
      area.appendChild(wrap);
      scheduleNextImage();
    } else {
      const nameEl = document.createElement('div');
      nameEl.className = 'sp-sponsor-name-big';
      nameEl.textContent = s.name;
      wrap.appendChild(nameEl);
      area.appendChild(wrap);
      scheduleNextImage();
    }
  };

  function advanceToNext() {
    if (_sponsorTimer) clearTimeout(_sponsorTimer);
    _sponsorIdx = (_sponsorIdx + 1) % S.sponsors.length;
    showSponsor(_sponsorIdx);
  }

  function scheduleNextImage() {
    if (_sponsorTimer) clearTimeout(_sponsorTimer);
    _sponsorTimer = setTimeout(advanceToNext, (D?.paginate_seconds || 10) * 1000);
  }

  showSponsor(_sponsorIdx);
}

// ═══════════════════════════════════════════════════
// STAGE TIMER MODE — speaker-facing countdown display
// ═══════════════════════════════════════════════════
let _stHoldRemain = null; // frozen remaining ms captured on HOLD

function renderStageTimer() {
  const live = liveSession();
  const held = S.sessions.find(s => s.status === 'HOLD');
  const session = live || held;

  if (!session) {
    _stHoldRemain = null;
    const next = readySession() || S.sessions.find(s => !['ENDED','CANCELLED'].includes(s.status));
    if (!next) {
      return `<div class="st-standby-wrap fade-in">
        <div class="st-standby-label">STANDBY</div>
        <div class="st-standby-session">${esc(S.event?.name || '')}</div>
      </div>`;
    }
    const diff = toMs(next.scheduled_start) - toTimeMs(correctedNow());
    return `<div class="st-standby-wrap fade-in">
      <div class="st-standby-label">NEXT UP IN</div>
      <div id="st-standby-countdown" class="st-standby-countdown">${fmtCountdown(Math.max(0, diff))}</div>
      <div class="st-standby-lbl">TO START</div>
      <div class="st-standby-session">${esc(next.title)}${next.speaker ? ` &middot; ${esc(next.speaker)}` : ''}</div>
    </div>`;
  }

  const isHold  = session.status === 'HOLD';
  const durMs   = schedDurMs(session);
  const startMs = session.actual_start
    ? new Date(session.actual_start).getTime()
    : correctedNow() - durMs / 2;
  const liveR   = durMs - (correctedNow() - startMs);

  // Capture freeze point on first HOLD tick
  if (isHold && _stHoldRemain === null) _stHoldRemain = liveR;
  if (!isHold) _stHoldRemain = null;

  const remain  = isHold ? _stHoldRemain : liveR;
  const ov      = remain < 0;
  const color   = ov ? '#ef4444'
    : isHold    ? '#f97316'
    : remain < 120_000 ? '#ef4444'
    : remain < 300_000 ? '#f59e0b'
    : '#22c55e';
  const pct     = Math.max(0, Math.min(100, (remain / durMs) * 100));
  const stTxt   = isHold ? 'HOLD'     : ov ? 'OVERTIME' : 'LIVE';
  const stCls   = isHold ? 'hold'     : ov ? 'overrun'  : 'live';
  const lbl     = isHold ? 'PAUSED'   : ov ? 'OVERTIME' : 'REMAINING';
  const flash   = ov && !isHold ? ' flash' : '';
  const next    = S.sessions.find(s => s.sort_order > session.sort_order
    && !['ENDED','CANCELLED'].includes(s.status));

  return `<div class="st-wrap fade-in">
    <div id="st-status" class="st-status ${stCls}">${stTxt}</div>
    <div id="st-timer" class="st-timer${flash}" style="color:${color}">${fmtTimer(remain)}</div>
    <div id="st-timer-lbl" class="st-timer-lbl">${lbl}</div>
    <div class="st-progress-bar">
      <div id="st-progress-fill" class="st-progress-fill" style="width:${pct}%;background:${color}"></div>
    </div>
    <div class="st-title">${esc(session.title)}</div>
    ${session.speaker ? `<div class="st-speaker">${esc(session.speaker)}</div>` : ''}
    ${next ? `<div class="st-next">NEXT: ${esc(next.title)}${next.speaker ? ` &middot; ${esc(next.speaker)}` : ''}</div>` : ''}
  </div>`;
}

// Wrapper so render() calls renderStageTimerArea(area) like renderAgenda/renderTimeline
function renderStageTimerArea(area) {
  // Only reset the HOLD freeze when transitioning away from HOLD (not on every render)
  const isCurrentlyHeld = S.sessions.some(s => s.status === 'HOLD');
  if (!isCurrentlyHeld) _stHoldRemain = null;
  const html = renderStageTimer();
  area.textContent = '';
  const range = document.createRange();
  range.selectNodeContents(area);
  range.deleteContents();
  area.insertAdjacentHTML('beforeend', html);
}

// ═══════════════════════════════════════════════════
// AGENDA MODE — room grid view
// ═══════════════════════════════════════════════════
function renderAgenda(area) {
  area.style.background = '';
  const active = S.sessions.filter(s => !['CANCELLED','ENDED'].includes(s.status) && s.room);
  const rooms  = [...new Set(active.map(s => s.room))].sort();

  if (!rooms.length) {
    area.innerHTML = `<div class="ag-empty fade-in">No sessions scheduled</div>`;
    return;
  }

  const colCount = Math.min(rooms.length, 4);  // max 4 cols for readability

  const cols = rooms.slice(0, colCount).map(room => {
    const roomSessions = active.filter(s => s.room === room)
      .sort((a,b) => (a.planned_start||'').localeCompare(b.planned_start||''));

    const cards = roomSessions.map(s => {
      const isLive  = s.status === 'LIVE' || s.status === 'OVERRUN';
      const isReady = s.status === 'READY' || s.status === 'CALLING';
      const badge   = isLive ? '● LIVE' : isReady ? '◈ READY' : '';
      const cls     = `ag-card${isLive ? ' live' : isReady ? ' ready' : ''}`;
      const time    = (s.planned_start || s.scheduled_start || '').slice(11, 16);
      return `<div class="${cls}">
        ${badge ? `<div class="ag-badge">${badge}</div>` : ''}
        <div class="ag-time">${esc(time)}</div>
        <div class="ag-title">${esc(s.title)}</div>
        ${s.speaker ? `<div class="ag-speaker">${esc(s.speaker)}</div>` : ''}
      </div>`;
    }).join('') || `<div class="ag-card empty">No sessions</div>`;

    return `<div class="ag-col">
      <div class="ag-room-header">${esc(room)}</div>
      ${cards}
    </div>`;
  }).join('');

  area.innerHTML = `<div class="ag-grid fade-in" style="--col-count:${colCount}">${cols}</div>`;
}

// ═══════════════════════════════════════════════════
// TIMELINE MODE — chronological session list
// ═══════════════════════════════════════════════════
function renderTimeline(area) {
  area.style.background = '';
  // Gather all sessions, apply room filter, sort by planned_start
  let sessions = [...S.sessions];
  if (D?.filter_room) sessions = sessions.filter(s => s.room === D.filter_room);
  sessions.sort((a, b) => (a.planned_start || '').localeCompare(b.planned_start || ''));

  if (!sessions.length) {
    area.innerHTML = `<div class="tl-empty fade-in">No sessions scheduled</div>`;
    return;
  }

  const rows = sessions.map((s, i) => {
    const isLive  = s.status === 'LIVE' || s.status === 'OVERRUN';
    const isReady = s.status === 'READY' || s.status === 'CALLING';
    const isEnded = s.status === 'ENDED';
    const isCancelled = s.status === 'CANCELLED';
    const cls = isLive ? ' live' : isReady ? ' ready' : isEnded ? ' ended' : isCancelled ? ' cancelled' : '';
    const badge = isLive ? `<div class="tl-badge live">● LIVE</div>` : isReady ? `<div class="tl-badge ready">◈ READY</div>` : '';
    const rawTime = timeStr(s.planned_start || s.scheduled_start || '');
    const time = rawTime ? rawTime.substring(0, 5) : '--:--';
    const rawEnd = timeStr(s.planned_end || s.scheduled_end || '');
    const endTime = rawEnd ? rawEnd.substring(0, 5) : '';
    const durMin = s.scheduled_end && s.scheduled_start
      ? Math.round((toMs(s.scheduled_end) - toMs(s.scheduled_start)) / 60000)
      : '';

    return `<div class="tl-row${cls}" data-tl-idx="${i}">
      <div class="tl-time">${esc(time)}</div>
      <div class="tl-body">
        <div class="tl-title">${esc(s.title)}</div>
        <div class="tl-meta">
          ${s.speaker ? `<span>${esc(s.speaker)}</span>` : ''}
          ${s.room ? `<span>📍 ${esc(s.room)}</span>` : ''}
          ${durMin ? `<span>⏱ ${durMin} min</span>` : ''}
        </div>
      </div>
      ${badge}
    </div>`;
  }).join('');

  area.innerHTML = `<div class="tl-wrap fade-in">
    <div class="tl-header">📜 PROGRAMME LIST${D?.filter_room ? ` — ${esc(D.filter_room).toUpperCase()}` : ''}</div>
    <div class="tl-list" id="tl-list-inner">${rows}</div>
  </div>`;

  // Start scroll or paginate based on display setting
  const scrollStyle = D?.scroll_style || 'scroll';
  if (scrollStyle === 'paginate') {
    startTimelinePaginate(sessions.length);
  } else {
    startTimelineScroll();
  }
}

// ── Timeline: smooth auto-scroll ──
function startTimelineScroll() {
  stopTimelineAnimation();
  const list = document.getElementById('tl-list-inner');
  if (!list) return;
  const wrap = list.parentElement;
  if (!wrap) return;

  // Only scroll if content overflows
  const contentH = list.scrollHeight;
  const viewH = wrap.clientHeight - 40; // subtract header
  if (contentH <= viewH) return;

  let offset = 0;
  const speed = 0.5; // px per frame (~30px/sec at 60fps)
  const pauseAtTopMs = 3000;
  let pauseUntil = performance.now() + pauseAtTopMs;

  function step(ts) {
    if (ts < pauseUntil) {
      _tlAnimTimer = requestAnimationFrame(step);
      return;
    }
    offset += speed;
    // Reset to top after scrolling through entire list + one viewport
    if (offset >= contentH) {
      offset = 0;
      pauseUntil = ts + pauseAtTopMs;
    }
    list.style.transform = `translateY(-${offset}px)`;
    _tlAnimTimer = requestAnimationFrame(step);
  }
  _tlAnimTimer = requestAnimationFrame(step);
}

function stopTimelineAnimation() {
  if (_tlAnimTimer) { cancelAnimationFrame(_tlAnimTimer); _tlAnimTimer = null; }
}

// ── Timeline: paginate ──
function startTimelinePaginate(totalCount) {
  stopTimelinePaginate();
  const pageSize = 8;
  const totalPages = Math.ceil(totalCount / pageSize);
  if (totalPages <= 1) return; // Everything fits on one page

  _tlPageIdx = 0;
  renderTimelinePage(pageSize, totalPages);
  const interval = (D?.paginate_seconds || 10) * 1000;
  _tlPageTimer = setInterval(() => {
    _tlPageIdx = (_tlPageIdx + 1) % totalPages;
    renderTimelinePage(pageSize, totalPages);
  }, interval);
}

function stopTimelinePaginate() {
  if (_tlPageTimer) { clearInterval(_tlPageTimer); _tlPageTimer = null; }
  _tlPageIdx = 0;
}

function renderTimelinePage(pageSize, totalPages) {
  const rows = document.querySelectorAll('.tl-row');
  const start = _tlPageIdx * pageSize;
  const end = start + pageSize;
  rows.forEach((r, i) => {
    r.style.display = (i >= start && i < end) ? '' : 'none';
  });
  // Show page indicator
  let indicator = document.querySelector('.tl-page-indicator');
  if (!indicator) {
    indicator = document.createElement('div');
    indicator.className = 'tl-page-indicator';
    indicator.style.cssText = 'position:absolute;bottom:8px;right:16px;font-size:10px;color:rgba(255,255,255,.2);letter-spacing:.1em;font-weight:600';
    const wrap = document.querySelector('.tl-wrap');
    if (wrap) wrap.appendChild(indicator);
  }
  indicator.textContent = `${_tlPageIdx + 1} / ${totalPages}`;
}

// ═══════════════════════════════════════════════════
// PROGRAMME MODE — time-slot × room grid
// ═══════════════════════════════════════════════════
function renderProgramme(area) {
  area.style.background = '';
  let sessions = S.sessions.filter(s => s.room);
  if (D?.filter_room) sessions = sessions.filter(s => s.room === D.filter_room);

  if (!sessions.length) {
    area.innerHTML = `<div class="pg-empty fade-in">No sessions scheduled</div>`;
    return;
  }

  // Determine rooms (max 6 columns)
  const rooms = [...new Set(sessions.map(s => s.room))].sort().slice(0, 6);
  const colCount = rooms.length;

  // Determine time range: round down earliest start to 30-min, round up latest end to 30-min
  let minT = Infinity, maxT = 0;
  sessions.forEach(s => {
    const st = toMs(timeStr(s.planned_start || s.scheduled_start || ''));
    const en = toMs(timeStr(s.planned_end || s.scheduled_end || '')) || (st + 2700000);
    if (st && st < minT) minT = st;
    if (en > maxT) maxT = en;
  });
  const slot30 = 30 * 60 * 1000;
  minT = Math.floor(minT / slot30) * slot30;
  maxT = Math.ceil(maxT / slot30) * slot30;
  const totalSlots = Math.round((maxT - minT) / slot30);

  if (totalSlots <= 0 || totalSlots > 48) {
    area.innerHTML = `<div class="pg-empty fade-in">Cannot render programme grid</div>`;
    return;
  }

  // Build slot labels
  const slots = [];
  for (let i = 0; i < totalSlots; i++) {
    const ms = minT + i * slot30;
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    slots.push({
      ms,
      label: `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`,
    });
  }

  // Map sessions to grid cells: for each session, find which slot(s) it spans
  // sessionGrid[slotIdx][roomIdx] = { session, isFirst }
  const grid = Array.from({ length: totalSlots }, () => Array(colCount).fill(null));

  sessions.forEach(s => {
    const rIdx = rooms.indexOf(s.room);
    if (rIdx === -1) return;
    const st = toMs(timeStr(s.planned_start || s.scheduled_start || ''));
    const en = toMs(timeStr(s.planned_end || s.scheduled_end || '')) || (st + 2700000);
    const startSlot = Math.max(0, Math.floor((st - minT) / slot30));
    const endSlot = Math.min(totalSlots, Math.ceil((en - minT) / slot30));
    for (let si = startSlot; si < endSlot; si++) {
      if (!grid[si][rIdx]) { // don't overwrite — first session wins on overlap
        const isLive = s.status === 'LIVE' || s.status === 'OVERRUN';
        const isReady = s.status === 'READY' || s.status === 'CALLING';
        grid[si][rIdx] = { session: s, isFirst: si === startSlot, isLive, isReady };
      }
    }
  });

  // Determine pagination
  const scrollStyle = D?.scroll_style || 'scroll';
  const slotsPerPage = 6;
  const totalPages = Math.ceil(totalSlots / slotsPerPage);
  const paginate = scrollStyle === 'paginate' && totalPages > 1;

  // Build grid HTML
  const gridCols = `auto repeat(${colCount}, 1fr)`;

  // Header row: corner + room names
  let headerHtml = `<div class="pg-corner">TIME</div>`;
  rooms.forEach(r => {
    headerHtml += `<div class="pg-room-hdr">${esc(r)}</div>`;
  });

  // Slot rows
  let rowsHtml = '';
  slots.forEach((slot, si) => {
    const pageIdx = Math.floor(si / slotsPerPage);
    const pageAttr = paginate ? ` data-pg-page="${pageIdx}"` : '';
    rowsHtml += `<div class="pg-time-lbl"${pageAttr}>${slot.label}</div>`;
    rooms.forEach((r, ri) => {
      const cell = grid[si][ri];
      if (!cell) {
        rowsHtml += `<div class="pg-cell"${pageAttr}></div>`;
      } else {
        const cls = cell.isLive ? ' live' : cell.isReady ? ' ready' : '';
        const badgeCls = cell.isLive ? ' live' : cell.isReady ? ' ready' : '';
        const badgeText = cell.isLive ? '● LIVE' : cell.isReady ? '◈ READY' : '';
        if (cell.isFirst) {
          rowsHtml += `<div class="pg-cell${cls}"${pageAttr}>
            ${badgeText ? `<div class="pg-cell-badge${badgeCls}">${badgeText}</div>` : ''}
            <div class="pg-cell-title">${esc(cell.session.title)}</div>
            ${cell.session.speaker ? `<div class="pg-cell-speaker">${esc(cell.session.speaker)}</div>` : ''}
          </div>`;
        } else {
          // Continuation slot — show a subtle indicator
          rowsHtml += `<div class="pg-cell${cls}"${pageAttr} style="border-top:none"></div>`;
        }
      }
    });
  });

  area.innerHTML = `<div class="pg-wrap fade-in">
    <div class="pg-header">🗓 DAY GRID${D?.filter_room ? ` — ${esc(D.filter_room).toUpperCase()}` : ''}</div>
    <div class="pg-grid" id="pg-grid-inner" style="grid-template-columns:${gridCols}">
      ${headerHtml}
      ${rowsHtml}
    </div>
    ${paginate ? `<div class="pg-page-indicator" id="pg-page-ind"></div>` : ''}
  </div>`;

  if (paginate) {
    startProgrammePaginate(totalPages);
  }
}

// ── Programme: paginate ──
function startProgrammePaginate(totalPages) {
  stopProgrammePaginate();
  _pgPageIdx = 0;
  renderProgrammePage(totalPages);
  const interval = (D?.paginate_seconds || 10) * 1000;
  _pgPageTimer = setInterval(() => {
    _pgPageIdx = (_pgPageIdx + 1) % totalPages;
    renderProgrammePage(totalPages);
  }, interval);
}

function stopProgrammePaginate() {
  if (_pgPageTimer) { clearInterval(_pgPageTimer); _pgPageTimer = null; }
  _pgPageIdx = 0;
}

function renderProgrammePage(totalPages) {
  const cells = document.querySelectorAll('[data-pg-page]');
  cells.forEach(c => {
    c.style.display = parseInt(c.dataset.pgPage) === _pgPageIdx ? '' : 'none';
  });
  const ind = document.getElementById('pg-page-ind');
  if (ind) ind.textContent = `${_pgPageIdx + 1} / ${totalPages}`;
}

// ═══════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toMs(t) {
  // Convert "HH:MM" or "HH:MM:SS" to ms from midnight
  if (!t) return 0;
  const parts = t.substring(0,8).split(':').map(Number);
  return (parts[0]*3600 + (parts[1]||0)*60 + (parts[2]||0)) * 1000;
}

function timeStr(t) {
  // Extract time portion from "2026-03-10T09:00:00" or "09:00:00" or "09:00"
  if (!t) return '';
  const idx = t.indexOf('T');
  return idx >= 0 ? t.substring(idx + 1) : t;
}

function toTimeMs(epochMs) {
  // ms within the current day (local time aligned to server offset)
  const d = new Date(epochMs);
  return (d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds()) * 1000;
}

function schedDurMs(s) {
  return (toMs(s.scheduled_end) - toMs(s.scheduled_start)) || 2700_000;
}

function fmtTimer(remainMs) {
  const abs = Math.abs(remainMs);
  const m   = Math.floor(abs / 60_000);
  const s   = Math.floor((abs % 60_000) / 1000);
  const prefix = remainMs < 0 ? '+' : '';
  // Fractional tenths in final 60 seconds
  if (abs < 60_000) {
    const tenth = Math.floor((abs % 1000) / 100);
    return `${prefix}${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${tenth}`;
  }
  return `${prefix}${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function fmtCountdown(ms) {
  const m = Math.floor(Math.max(0,ms) / 60_000);
  const s = Math.floor((Math.max(0,ms) % 60_000) / 1000);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ── Identify flash (triggered by console ⚡ ID button) ──
function flashIdentify() {
  const el = document.getElementById('identify-flash');
  if (!el) return;
  el.style.display = 'block';
  el.style.opacity = '0.9';
  setTimeout(() => { el.style.opacity  = '0'; },   500);
  setTimeout(() => { el.style.display  = 'none'; }, 900);
}

// Handle device wake-up (laptop lid open)
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && sb) {
    await syncClock();
    if (_chan?.state !== 'joined') { _retries = 0; scheduleReconnect(); }  // reset backoff on wake
    else {
      const { data: sessions } = await sb.from('leod_sessions')
        .select('*').eq('event_id', D.event_id).order('sort_order');
      S.sessions = sessions || [];
      render();
    }
  }
});
</script>
